name: Deploy and Update Changelog

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy and Sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npx firebase-tools@latest deploy --only hosting --project homepage-7cfc8 --non-interactive

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Sync Shared Changelog
        if: success()
        env:
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git clone https://x-access-token:${{ secrets.HUB_TOKEN }}@github.com/jmsutorus/earthbound_changelog.git hub
          mkdir -p hub/content/repos/terra_docs
          cp CHANGELOG.md hub/content/repos/terra_docs/CHANGELOG.md
          cd hub
          git add .
          git commit -m "Update changelog for Terra Docs" || echo "No changes to commit"
          git push
